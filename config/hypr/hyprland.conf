# Monitor configuration
monitor=,preferred,auto,1
monitor=HDMI-A-1,preferred,auto-up,1
monitor=desc:BNQ BenQ PJ 0x0000012,1920x1080@60,auto-up,1

# Autostart
exec-once = systemctl --user import-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP
exec-once = dbus-update-activation-environment WAYLAND_DISPLAY DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprctl setcursor "Capitaine Cursors (Gruvbox)" 24
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Capitaine Cursors
exec-once = vicinae server # d-run menu
exec-once = hypridle # idle management
exec-once = hyprpaper # wallpapers
exec-once = hyprpanel # status bar

# Input configuration
input {
    kb_layout = de
    repeat_delay = 300
    repeat_rate = 50
    
    touchpad {
        tap-to-click = true
    }
    
    follow_mouse = 1
}

# General settings
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 4
    col.active_border = rgb(00ffd5)
    col.inactive_border = rgb(333333)
    
    layout = dwindle  # Hyprland's automatic tiling layout
}

dwindle {
    pseudotile = true

    force_split = 2

    preserve_split = true
}

# Decoration
decoration {
    rounding = 5
    
    blur {
        enabled = false
    }
}


animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    
    animation = windows, 1, 2, myBezier, popin 80%
    animation = windowsOut, 1, 2, default, popin 80%
    animation = border, 1, 3, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default, slide
}

# Workspace rules
workspace = 1, monitor:HDMI-A-1

# Window rules
windowrulev2 = workspace 6, class:^(Mattermost)$

# Key bindings
$mod = SUPER

# Basic bindings
bind = $mod, Return, exec, GTK_IM_MODULE=simple ghostty
bind = $mod, Q, killactive
bind = $mod, D, exec, vicinae toggle
bind = $mod SHIFT, S, exec, XDG_SCREENSHOTS_DIR=~/screenshots grim -g "$(slurp)" - | wl-copy && wl-paste > ~/screenshots/$(date +%Y%m%d_%H%M%S).png

# Focus movement (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Focus movement (arrow keys)
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d

# Move windows (vim keys)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Move windows (arrow keys)
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Down, movewindow, d

# Fullscreen
bind = $mod, F, fullscreen, 0

# Layout controls
bind = $mod, S, layoutmsg, orientationtop     # stack layout
bind = $mod, E, layoutmsg, orientationleft    # side-by-side

# Floating
bind = $mod SHIFT, Space, togglefloating
bind = $mod, Space, focusmonitor, +1  # or use another binding for mode toggle

# Scratchpad equivalent (special workspace)
bind = $mod SHIFT, minus, movetoworkspace, special
bind = $mod, minus, togglespecialworkspace

# Workspace bindings
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move to workspace
bind = $mod CTRL, 1, movetoworkspace, 1
bind = $mod CTRL, 2, movetoworkspace, 2
bind = $mod CTRL, 3, movetoworkspace, 3
bind = $mod CTRL, 4, movetoworkspace, 4
bind = $mod CTRL, 5, movetoworkspace, 5
bind = $mod CTRL, 6, movetoworkspace, 6
bind = $mod CTRL, 7, movetoworkspace, 7
bind = $mod CTRL, 8, movetoworkspace, 8
bind = $mod CTRL, 9, movetoworkspace, 9
bind = $mod CTRL, 0, movetoworkspace, 10

# Move to workspace and follow
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 1, workspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 2, workspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 3, workspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 4, workspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 5, workspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 6, workspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 7, workspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 8, workspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 9, workspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod SHIFT, 0, workspace, 10

# Brightness controls
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Audio controls
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

bind = , XF86NotificationCenter, exec, playerctl previous
bind = , XF86PickupPhone, exec, playerctl play-pause
bind = , XF86HangupPhone, exec, playerctl next

# System controls
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, Q, exec, hyprlock

# Resize submap
bind = $mod, R, submap, resize
submap = resize
binde = , Right, resizeactive, 10 0
binde = , Left, resizeactive, -10 0
binde = , Up, resizeactive, 0 -10
binde = , Down, resizeactive, 0 10
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
