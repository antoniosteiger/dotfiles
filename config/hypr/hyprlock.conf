# Fingerprint authentication
auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning fingerprint
    }
}

# Background with blur
background {
    monitor = 
    path = screenshot
    blur_passes = 2
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

# Clock label
label {
    monitor = 
    text = $TIME
    font_size = 64
    font_family = Noto Sans Bold
    position = 0, 150
    halign = center
    valign = center
}

# Fingerprint prompt label
label {
    monitor = 
    text = $FPRINTPROMPT
    font_size = 18
    position = 0, 60
    halign = center
    valign = center
}

# Circular indicator (Swaylock style)
input-field {
    monitor = 
    size = 100, 100
    outline_thickness = 5
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    fade_on_empty = false
    placeholder_text = 
    hide_input = false
    rounding = -1
    position = 0, -50
    halign = center
    valign = center
}
